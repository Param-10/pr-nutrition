name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Stage npm release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        # Immutable SHA verified against the upstream actions/setup-node v6.4.0 release.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.17.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm 11.17.0
        run: npm install --global --ignore-scripts --no-audit --no-fund npm@11.17.0

      - name: Install compatible Corepack
        run: npm install --global --ignore-scripts --no-audit --no-fund corepack@0.34.0

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Test packed CLI offline
        run: pnpm smoke

      - name: Verify release package
        run: pnpm release:check

      - name: Verify tag matches CLI version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "${GITHUB_REF#refs/tags/}" != "v$VERSION" ]; then
            echo "Error: Tag ${GITHUB_REF#refs/tags/} does not match CLI version v$VERSION"
            exit 1
          fi

      - name: Stage npm publish
        working-directory: packages/cli
        # Stages for inspection only; public release requires separate maintainer 2FA approval.
        run: npm stage publish --access public
